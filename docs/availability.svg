<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="186" viewBox="0 0 720 186" role="img" aria-label="Aurora availability: Linux and Bash available now; macOS, Windows, Zsh, and Fish coming soon">
  <defs>
    <linearGradient id="aurora" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#875faf"/>
      <stop offset="45%" stop-color="#af87ff"/>
      <stop offset="100%" stop-color="#5fd7ff"/>
    </linearGradient>
    <linearGradient id="live-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f2b22"/>
      <stop offset="100%" stop-color="#1a1f2b"/>
    </linearGradient>
    <linearGradient id="live-stroke" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87d787"/>
      <stop offset="100%" stop-color="#5fd7af"/>
    </linearGradient>
    <filter id="live-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- card -->
  <rect width="720" height="186" rx="14" fill="#12121a"/>
  <rect x="0.5" y="0.5" width="719" height="185" rx="13.5" fill="none" stroke="#2a2a3d"/>
  <rect x="1.5" y="1.5" width="717" height="183" rx="12.5" fill="none" stroke="url(#aurora)" stroke-width="1" opacity="0.28"/>

  <!-- header -->
  <text x="360" y="32" text-anchor="middle" fill="#5fd7ff" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="2.4">WHERE AURORA RUNS</text>
  <rect x="260" y="40" width="200" height="2" rx="1" fill="#875faf" opacity="0.55"/>

  <!-- divider -->
  <line x1="24" y1="100" x2="696" y2="100" stroke="#2a2a3d" stroke-width="1"/>

  <!-- row labels -->
  <text x="24" y="74" fill="#6c6f85" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" letter-spacing="1.6">PLATFORMS</text>
  <text x="24" y="134" fill="#6c6f85" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" letter-spacing="1.6">SHELLS</text>

  <!-- row hints -->
  <text x="696" y="74" text-anchor="end" fill="#4a4a5e" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" font-style="italic">+ more distros</text>
  <text x="696" y="134" text-anchor="end" fill="#4a4a5e" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" font-style="italic">+ more shells</text>

  <!-- pill template positions: x=118, w=158, h=38, gap=14 -->

  <!-- Linux LIVE -->
  <g transform="translate(118, 54)">
    <rect width="158" height="38" rx="9" fill="url(#live-bg)" stroke="url(#live-stroke)" stroke-width="1.5" filter="url(#live-glow)"/>
    <circle cx="20" cy="19" r="6" fill="#87d787" opacity="0.25"/>
    <circle cx="20" cy="19" r="3.5" fill="#87d787"/>
    <!-- tux-ish ping -->
    <circle cx="20" cy="19" r="7" fill="none" stroke="#87d787" stroke-width="1" opacity="0.35"/>
    <text x="36" y="24" fill="#e8d5ff" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Linux</text>
    <rect x="104" y="11" width="42" height="16" rx="8" fill="#87d787" opacity="0.18"/>
    <text x="125" y="23" text-anchor="middle" fill="#87d787" font-family="system-ui, -apple-system, sans-serif" font-size="8.5" font-weight="800" letter-spacing="0.6">LIVE</text>
  </g>

  <!-- macOS SOON -->
  <g transform="translate(290, 54)">
    <rect width="158" height="38" rx="9" fill="#18181f" stroke="#35354a" stroke-width="1" stroke-dasharray="5 4"/>
    <circle cx="20" cy="19" r="3.5" fill="#4a4a5e"/>
    <text x="36" y="24" fill="#7a7a8e" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">macOS</text>
    <rect x="98" y="11" width="48" height="16" rx="8" fill="#ffd7af" opacity="0.12"/>
    <text x="122" y="23" text-anchor="middle" fill="#e8b87a" font-family="system-ui, -apple-system, sans-serif" font-size="8.5" font-weight="800" letter-spacing="0.6">SOON</text>
  </g>

  <!-- Windows SOON -->
  <g transform="translate(462, 54)">
    <rect width="158" height="38" rx="9" fill="#18181f" stroke="#35354a" stroke-width="1" stroke-dasharray="5 4"/>
    <circle cx="20" cy="19" r="3.5" fill="#4a4a5e"/>
    <text x="36" y="24" fill="#7a7a8e" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Windows</text>
    <rect x="94" y="11" width="52" height="16" rx="8" fill="#ffd7af" opacity="0.12"/>
    <text x="120" y="23" text-anchor="middle" fill="#e8b87a" font-family="system-ui, -apple-system, sans-serif" font-size="8.5" font-weight="800" letter-spacing="0.6">SOON</text>
  </g>

  <!-- Bash LIVE -->
  <g transform="translate(118, 114)">
    <rect width="158" height="38" rx="9" fill="url(#live-bg)" stroke="url(#live-stroke)" stroke-width="1.5" filter="url(#live-glow)"/>
    <circle cx="20" cy="19" r="6" fill="#87d787" opacity="0.25"/>
    <circle cx="20" cy="19" r="3.5" fill="#87d787"/>
    <circle cx="20" cy="19" r="7" fill="none" stroke="#87d787" stroke-width="1" opacity="0.35"/>
    <text x="36" y="24" fill="#e8d5ff" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Bash</text>
    <rect x="104" y="11" width="42" height="16" rx="8" fill="#87d787" opacity="0.18"/>
    <text x="125" y="23" text-anchor="middle" fill="#87d787" font-family="system-ui, -apple-system, sans-serif" font-size="8.5" font-weight="800" letter-spacing="0.6">LIVE</text>
  </g>

  <!-- Zsh SOON -->
  <g transform="translate(290, 114)">
    <rect width="158" height="38" rx="9" fill="#18181f" stroke="#35354a" stroke-width="1" stroke-dasharray="5 4"/>
    <circle cx="20" cy="19" r="3.5" fill="#4a4a5e"/>
    <text x="36" y="24" fill="#7a7a8e" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Zsh</text>
    <rect x="104" y="11" width="48" height="16" rx="8" fill="#ffd7af" opacity="0.12"/>
    <text x="128" y="23" text-anchor="middle" fill="#e8b87a" font-family="system-ui, -apple-system, sans-serif" font-size="8.5" font-weight="800" letter-spacing="0.6">SOON</text>
  </g>

  <!-- Fish SOON -->
  <g transform="translate(462, 114)">
    <rect width="158" height="38" rx="9" fill="#18181f" stroke="#35354a" stroke-width="1" stroke-dasharray="5 4"/>
    <circle cx="20" cy="19" r="3.5" fill="#4a4a5e"/>
    <text x="36" y="24" fill="#7a7a8e" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Fish</text>
    <rect x="100" y="11" width="48" height="16" rx="8" fill="#ffd7af" opacity="0.12"/>
    <text x="124" y="23" text-anchor="middle" fill="#e8b87a" font-family="system-ui, -apple-system, sans-serif" font-size="8.5" font-weight="800" letter-spacing="0.6">SOON</text>
  </g>
</svg>
